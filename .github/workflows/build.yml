# Godot 4.6 Build Workflow
name: Godot Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6
  GODOT_VERSION_FULL: 4.6.1
  PROJECT_NAME: RhythmX

jobs:
  # ============================================================
  # Windows Export
  # ============================================================
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Templates
        run: |
          echo "Container home: $HOME"
          echo "Container user: $(whoami)"
          mkdir -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/* \
              $HOME/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/
          fi
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/ || echo "No templates"

      - name: Windows Build
        run: |
          mkdir -p build/windows
          godot --headless --verbose --path . --export-release "Windows Desktop" 2>&1 | tee build.log
          EXIT_CODE=$?
          [ -f "RhythmX.exe" ] && cp -v RhythmX.exe build/windows/
          [ -f "RhythmX.pck" ] && cp -v RhythmX.pck build/windows/
          ls -lh build/windows/ || echo "build/windows empty"
          exit $EXIT_CODE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/windows/*.exe
            build/windows/*.pck
          if-no-files-found: error

  # ============================================================
  # Linux Export
  # ============================================================
  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Templates
        run: |
          echo "Container home: $HOME"
          echo "Container user: $(whoami)"
          echo "Godot version: ${GODOT_VERSION_FULL}"
          # Godot 4.x uses X.Y.stable format (e.g. 4.6.stable not 4.6.1.stable)
          # Templates go in export_templates/ for Godot 4.x
          mkdir -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* \
              $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          fi
          echo "=== Templates dir ==="
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ || echo "No templates"

      - name: Download Linux/Web Templates
        run: |
          echo "Container home: $HOME"
          apt-get update -qq && apt-get install -y -qq curl unzip
          mkdir -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cd /tmp
          curl -L -o templates.tpz "https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz"
          unzip -o templates.tpz
          echo "=== Extracted files ==="
          ls -la templates/
          # Copy Linux template binaries
          cp templates/linux_release.* templates/linux_debug.* $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true
          # Web templates: Godot 4.x expects .zip files with specific names
          [ -f templates/web_debug.zip ] && cp templates/web_debug.zip $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/godot.javascript.debug.zip
          [ -f templates/web_release.zip ] && cp templates/web_release.zip $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/godot.javascript.opt.zip
          cp templates/icudt_godot.dat $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true
          echo "=== Installed templates ==="
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Linux Build
        run: |
          mkdir -p build/linux
          echo "=== Godot version ==="
          godot --version
          echo "=== Template directory ==="
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ || echo "No templates dir"
          echo "=== Export presets in project ==="
          grep "^name=" export_presets.cfg || echo "No presets found"
          echo "=== Running Godot export ==="
          godot --headless --verbose --path . --export-release "Linux/X11" 2>&1 | tee linux_build.log
          EXIT_CODE=$?
          echo "=== Export exit code: $EXIT_CODE ==="
          echo "=== Files in root ==="
          ls -lh *.x86_64 *.pck 2>/dev/null || echo "No .x86_64/.pck in root"
          echo "=== Files in build/linux ==="
          ls -lh build/linux/ 2>/dev/null || echo "build/linux empty"
          [ -f "RhythmX.x86_64" ] && cp -v RhythmX.x86_64 build/linux/
          [ -f "RhythmX.pck" ] && cp -v RhythmX.pck build/linux/
          exit $EXIT_CODE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/*.x86_64
          if-no-files-found: error

  # ============================================================
  # Web Export
  # ============================================================
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Templates
        run: |
          echo "Container home: $HOME"
          echo "Container user: $(whoami)"
          echo "Godot version: ${GODOT_VERSION_FULL}"
          # Godot 4.x uses X.Y.stable format (e.g. 4.6.stable not 4.6.1.stable)
          # Templates go in export_templates/ for Godot 4.x
          mkdir -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable/* \
              $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          fi
          echo "=== Templates dir ==="
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ || echo "No templates"

      - name: Download Linux/Web Templates
        run: |
          echo "Container home: $HOME"
          apt-get update -qq && apt-get install -y -qq curl unzip
          mkdir -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          cd /tmp
          curl -L -o templates.tpz "https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz"
          unzip -o templates.tpz
          echo "=== Extracted files ==="
          ls -la templates/
          # Copy Linux template binaries
          cp templates/linux_release.* templates/linux_debug.* $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true
          # Web templates: Godot 4.x expects .zip files with specific names, not extracted contents
          [ -f templates/web_debug.zip ] && cp templates/web_debug.zip $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/godot.javascript.debug.zip
          [ -f templates/web_release.zip ] && cp templates/web_release.zip $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/godot.javascript.opt.zip
          cp templates/icudt_godot.dat $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true
          echo "=== Installed templates ==="
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Web Build
        run: |
          mkdir -p build/web
          echo "=== Godot version ==="
          godot --version
          echo "=== Template directory ==="
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ || echo "No templates dir"
          echo "=== Running Godot export ==="
          godot --headless --verbose --path . --export-release "Web" 2>&1 | tee web_build.log
          EXIT_CODE=$?
          echo "=== Export exit code: $EXIT_CODE ==="
          echo "=== Files in root ==="
          ls -lhR RhythmX_web/ 2>/dev/null || echo "No RhythmX_web dir in root"
          echo "=== Files in build/web ==="
          ls -lh build/web/ 2>/dev/null || echo "build/web empty"
          if [ -d "RhythmX_web" ]; then cp -rv RhythmX_web/* build/web/; fi
          exit $EXIT_CODE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            build/web/index.html
            build/web/*.pck
            build/web/*.wasm
            build/web/*.js
          if-no-files-found: warn

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          cd build/web
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy to GitHub Pages"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master:gh-pages
        continue-on-error: true

  # ============================================================
  # Android Export
  # ============================================================
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Templates
        run: |
          echo "Container home: $HOME"
          echo "Container user: $(whoami)"
          mkdir -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/* \
              $HOME/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/
          fi
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/ || echo "No templates"

      - name: Download Android Template
        run: |
          echo "Container home: $HOME"
          apt-get update -qq && apt-get install -y -qq curl unzip
          mkdir -p $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable

          # Download Godot 4.6.1 export templates
          cd /tmp
          curl -L -o templates.tpz "https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz"
          unzip -o templates.tpz
          echo "=== Extracted files ==="
          ls -la templates/

          # Copy Android APK templates
          cp templates/android_release.apk templates/android_debug.apk $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/ 2>/dev/null || true

          # Extract android_source.zip for Gradle builds
          [ -f templates/android_source.zip ] && unzip -o templates/android_source.zip -d $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

          # Extract ios.zip and macos.zip
          [ -f templates/ios.zip ] && unzip -o templates/ios.zip -d $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          [ -f templates/macos.zip ] && unzip -o templates/macos.zip -d $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

          echo "Installed templates:"
          ls -la $HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          sdkmanager --version 2>/dev/null || echo "sdkmanager not found"

      - name: Install Android Build Tools
        run: |
          export ANDROID_HOME=/opt/android-sdk
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -10 || true

      - name: Create Debug Keystore
        run: |
          mkdir -p ~/.android
          apt-get update -qq && apt-get install -y -qq openjdk-11-jdk-headless -y
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" \
            -noprompt
          ls -la ~/.android/debug.keystore

      - name: Build APK
        run: |
          mkdir -p build/android
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

          # Configure Godot with Android SDK path
          mkdir -p $HOME/.config/godot
          cat > $HOME/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          android/sdk_path = "/opt/android-sdk"
          android/adb_executable = "/opt/android-sdk/platform-tools/adb"
          android/apksigner_executable = "/opt/android-sdk/build-tools/34.0.0/bin/apksigner"
          EOF

          echo "=== Running Godot export ==="
          godot --headless --verbose --path . --export-debug "Android" 2>&1 | tee android_build.log
          EXIT_CODE=$?

          echo "=== Searching for APK ==="
          ls -lh *.apk 2>/dev/null || echo "No APK in root"
          find ~/.local/share/godot/android_build/ -name "*.apk" 2>/dev/null | head -5 || echo "No APK in Gradle cache"
          find /tmp -name "*.apk" 2>/dev/null | head -5 || echo "No APK in /tmp"

          [ -f "RhythmX-debug.apk" ] && cp -v RhythmX-debug.apk build/android/
          APK_PATH=$(find ~/.local/share/godot/android_build/ -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ] && [ ! -f "build/android/RhythmX-debug.apk" ]; then
            cp -v "$APK_PATH" build/android/RhythmX-debug.apk
          fi
          ls -lh build/android/ || echo "build/android empty"
          exit $EXIT_CODE

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/*.apk
          if-no-files-found: warn

  # ============================================================
  # Build Summary
  # ============================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [export-windows, export-linux, export-web, export-android]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.export-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | ${{ needs.export-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web      | ${{ needs.export-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android  | ${{ needs.export-android.result }} |" >> $GITHUB_STEP_SUMMARY
