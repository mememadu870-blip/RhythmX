# Godot 4.6 构建工作流
# 当前支持：Windows (已测试通过)
name: Godot Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6
  GODOT_VERSION_FULL: 4.6.1
  PROJECT_NAME: RhythmX

jobs:
  # ============================================================
  # Windows 桌面版构建 (主要目标)
  # ============================================================
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable ~/.local/share/godot/export_templates/
          fi
          echo "=== Export Templates ==="
          ls -la ~/.local/share/godot/export_templates/ || echo "No templates found"

      - name: Verify Project
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo "=== Export Presets ==="
          cat export_presets.cfg | head -50
          echo "=== Checking Godot Version ==="
          godot --version

      - name: Windows Build
        run: |
          mkdir -p build/windows
          echo "=== Starting Windows Export ==="
          echo "=== Current directory ==="
          pwd
          echo "=== Project files ==="
          ls -la

          # Godot 4.x export - the export path in preset must exist
          # We use the preset's export_path, so just need to ensure build dirs exist
          echo "=== Running Godot export ==="
          godot --headless --verbose --path . --export-release "Windows Desktop" 2>&1 | tee build.log
          EXIT_CODE=$?

          echo "=== Export exited with code: $EXIT_CODE ==="

          # Check both preset path and specified path
          echo "=== Checking for output files ==="
          ls -lh RhythmX.exe build/windows/*.exe build/*.exe 2>/dev/null || echo "No .exe found"
          ls -lh RhythmX.pck build/windows/*.pck build/*.pck 2>/dev/null || echo "No .pck found"

          # Copy files to build/windows if they're in root
          if [ -f "RhythmX.exe" ]; then
            mv RhythmX.exe build/windows/
          fi
          if [ -f "RhythmX.pck" ]; then
            mv RhythmX.pck build/windows/
          fi

          echo "=== Final build output ==="
          ls -lh build/windows/ || echo "Build directory empty"
          find build/windows -type f 2>/dev/null || true

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Build failed! Check logs above."
            exit $EXIT_CODE
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/windows/*.exe
            build/windows/*.pck
          if-no-files-found: warn
          include-hidden-files: false

  # ============================================================
  # Linux 桌面版构建
  # 注意：需要先在 Godot 编辑器中添加 "Linux/X11" 导出预设
  # ============================================================
  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi

          echo "=== Checking container for templates ==="
          echo "--- /root/.local/share/godot/ ---"
          ls -laR /root/.local/share/godot/ 2>/dev/null | head -50 || echo "Nothing found"
          echo "--- /root/.local/share/godot/templates/ ---"
          ls -laR /root/.local/share/godot/templates/ 2>/dev/null | head -50 || echo "Nothing found"

          # Godot 4.6 uses a different template structure
          # Templates are in /root/.local/share/godot/templates/4.6.stable/
          if [ -d "/root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable" ]; then
            echo "Found templates directory"
            # Copy the entire templates folder
            cp -r /root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable \
              ~/.local/share/godot/templates/
          fi

          # Also check for export_templates (older structure)
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            echo "Found export_templates directory"
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable \
              ~/.local/share/godot/export_templates/
          fi

          echo "=== Final state ==="
          ls -laR ~/.local/share/godot/ 2>/dev/null | head -60

      - name: Linux Build
        run: |
          mkdir -p build/linux
          echo "=== Starting Linux Export ==="
          echo "Checking available templates:"
          ls -la ~/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable/ 2>/dev/null || echo "No templates in templates dir"
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/ 2>/dev/null || echo "No templates in export_templates dir"

          # Godot 4.x export - use preset path
          echo "=== Running Godot export ==="
          godot --headless --verbose --path . --export-release "Linux/X11" 2>&1 | tee linux_build.log
          EXIT_CODE=$?
          echo "=== Export exited with code: $EXIT_CODE ==="

          # Check for output files in all possible locations
          echo "=== Checking for output files ==="
          ls -lh RhythmX.x86_64 2>/dev/null || echo "No RhythmX.x86_64 in root"
          ls -lh build/linux/ 2>/dev/null || echo "build/linux empty or not found"

          # Copy to build/linux if in root
          if [ -f "RhythmX.x86_64" ]; then
            echo "Moving RhythmX.x86_64 to build/linux..."
            mv -v RhythmX.x86_64 build/linux/
          fi

          echo "=== Final build output ==="
          ls -lh build/linux/ || echo "Build directory empty"
          find build/linux -type f 2>/dev/null || true

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Linux build failed!"
            exit $EXIT_CODE
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/*.x86_64
          if-no-files-found: warn

  # ============================================================
  # Web 导出 (HTML5)
  # 注意：需要先在 Godot 编辑器中添加 "Web" 导出预设
  # ============================================================
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi

          echo "=== Checking container for templates ==="
          echo "--- /root/.local/share/godot/templates/ ---"
          ls -laR /root/.local/share/godot/templates/ 2>/dev/null | head -50 || echo "Nothing found"

          # Godot 4.6 uses templates directory
          if [ -d "/root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable" ]; then
            echo "Found templates directory"
            cp -r /root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable \
              ~/.local/share/godot/templates/
          fi

          # Also check for export_templates
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            echo "Found export_templates directory"
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable \
              ~/.local/share/godot/export_templates/
          fi

          echo "=== Final state ==="
          ls -laR ~/.local/share/godot/ 2>/dev/null | head -60

      - name: Web Build
        run: |
          mkdir -p build/web
          echo "=== Starting Web Export ==="
          echo "Checking available templates:"
          ls -la ~/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable/ 2>/dev/null || echo "No templates in templates dir"
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/ 2>/dev/null || echo "No templates in export_templates dir"

          # Godot 4.x export - use preset path
          echo "=== Running Godot export ==="
          godot --headless --verbose --path . --export-release "Web" 2>&1 | tee web_build.log
          EXIT_CODE=$?
          echo "=== Export exited with code: $EXIT_CODE ==="

          # Check for output files in all possible locations
          echo "=== Checking for output files ==="
          ls -la RhythmX_web/ 2>/dev/null || echo "No RhythmX_web directory"
          ls -lh build/web/ 2>/dev/null || echo "No build/web directory"

          # Copy from root to build/web
          if [ -d "RhythmX_web" ]; then
            echo "Copying RhythmX_web to build/web..."
            rm -rf build/web/*
            cp -rv RhythmX_web/* build/web/
            echo "Copy complete"
          fi

          echo "=== Final build output ==="
          ls -lh build/web/ || echo "Build directory empty"
          find build/web -type f 2>/dev/null || true

          if [ $EXIT_CODE -ne 0 ]; then
            echo "Web build failed!"
            exit $EXIT_CODE
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            build/web/index.html
            build/web/*.pck
            build/web/*.wasm
            build/web/*.js
          if-no-files-found: warn

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          cd build/web
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy to GitHub Pages"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master:gh-pages
        continue-on-error: true

  # ============================================================
  # Android 导出 (APK)
  # ============================================================
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi

          echo "=== Checking container for templates ==="
          ls -laR /root/.local/share/godot/templates/ 2>/dev/null | head -50 || echo "Nothing found"

          if [ -d "/root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable" ]; then
            cp -r /root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable \
              ~/.local/share/godot/templates/
          fi

          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            cp -r /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable \
              ~/.local/share/godot/export_templates/
          fi

          echo "=== Final state ==="
          ls -laR ~/.local/share/godot/ 2>/dev/null | head -60

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "PATH=$PATH"
          sdkmanager --version 2>/dev/null || echo "sdkmanager not found"
          ls -la $ANDROID_HOME 2>/dev/null || echo "Android SDK not found"

      - name: Install Android Build Tools
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" 2>&1 | tail -10 || true

      - name: Create Debug Keystore
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

          # Create keystore directory
          mkdir -p ~/.android

          # Install OpenJDK if keytool not available
          if ! command -v keytool &> /dev/null; then
            echo "Installing OpenJDK..."
            apt-get update -qq && apt-get install -y -qq openjdk-11-jdk-headless
          fi

          # Generate debug keystore
          echo "Generating debug keystore..."
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" \
            -noprompt 2>&1 || {
            echo "keytool failed, trying with different options..."
            keytool -genkeypair \
              -keystore ~/.android/debug.keystore \
              -storepass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug, O=Android, C=US"
          }

          echo "Keystore created:"
          ls -la ~/.android/debug.keystore

      - name: Build APK (Debug Mode)
        run: |
          mkdir -p build/android
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

          echo "=== Starting Android Export ==="
          echo "Godot version:"
          godot --version

          # Godot 4.x export - use preset path
          godot --headless --verbose --path . --export-debug "Android" 2>&1 | tee android_build.log
          EXIT_CODE=$?
          echo "=== Export exited with code: $EXIT_CODE ==="
          tail -50 android_build.log

          # Check multiple possible output locations
          echo "=== Checking for APK output ==="
          echo "--- build/android/ ---"
          ls -lh build/android/ || echo "build/android empty"
          echo "--- Root directory ---"
          ls -lh *.apk 2>/dev/null || echo "No APK in root"
          echo "--- ~/.local/share/godot/android_build/ ---"
          ls -lhR ~/.local/share/godot/android_build/ 2>/dev/null || echo "No Gradle output"

          # Copy APK to build/android from root if needed
          if [ ! -f "build/android/${PROJECT_NAME}-debug.apk" ]; then
            if [ -f "RhythmX-debug.apk" ]; then
              echo "Found RhythmX-debug.apk in root, copying..."
              cp -v RhythmX-debug.apk build/android/
            elif [ -f "*.apk" ]; then
              echo "Found APK in root, copying..."
              cp -v *.apk build/android/
            else
              # Try to copy from Gradle output
              echo "Searching Gradle output for APK..."
              find ~/.local/share/godot/android_build/ -name "*.apk" 2>/dev/null | head -5 || true
              APK_PATH=$(find ~/.local/share/godot/android_build/ -name "*.apk" 2>/dev/null | head -1)
              if [ -n "$APK_PATH" ]; then
                echo "Found APK at: $APK_PATH"
                cp "$APK_PATH" build/android/${PROJECT_NAME}-debug.apk
              fi
            fi
          fi

          echo "=== Final APK check ==="
          ls -lh build/android/ || echo "build/android still empty"
          find build/android -type f 2>/dev/null || true
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Android build failed!"
            exit $EXIT_CODE
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/*.apk
          if-no-files-found: warn

  # ============================================================
  # 构建汇总
  # ============================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [export-windows, export-linux, export-web, export-android]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.export-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | ${{ needs.export-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web      | ${{ needs.export-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android  | ${{ needs.export-android.result }} |" >> $GITHUB_STEP_SUMMARY

          # List artifacts
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Download artifacts from the workflow run page:" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
