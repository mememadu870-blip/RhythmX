# Godot 4.6 构建工作流
# 当前支持：Windows (已测试通过)
name: Godot Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6
  GODOT_VERSION_FULL: 4.6.1
  PROJECT_NAME: RhythmX

jobs:
  # ============================================================
  # Windows 桌面版构建 (主要目标)
  # ============================================================
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable ~/.local/share/godot/export_templates/
          fi
          echo "=== Export Templates ==="
          ls -la ~/.local/share/godot/export_templates/ || echo "No templates found"

      - name: Verify Project
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo "=== Export Presets ==="
          cat export_presets.cfg | head -50
          echo "=== Checking Godot Version ==="
          godot --version

      - name: Windows Build
        run: |
          mkdir -p build/windows
          echo "=== Starting Windows Export ==="
          godot --headless --verbose --export-release "Windows Desktop" build/windows/${PROJECT_NAME}.exe 2>&1 | tee build.log
          EXIT_CODE=$?
          echo "=== Export exited with code: $EXIT_CODE ==="
          echo "=== Build Output ==="
          ls -lh build/windows/ || echo "Build directory empty"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Build failed! Check logs above."
            exit $EXIT_CODE
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows

  # ============================================================
  # Linux 桌面版构建
  # 注意：需要先在 Godot 编辑器中添加 "Linux/X11" 导出预设
  # ============================================================
  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable ~/.local/share/godot/export_templates/
          fi
          echo "=== Export Templates Available ==="
          ls -la ~/.local/share/godot/export_templates/ || echo "No templates found"

      - name: Download Linux Export Template
        run: |
          cd /tmp
          echo "Downloading Godot ${GODOT_VERSION_FULL} Linux export template..."
          curl -L -o linux_template.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION_FULL}-stable/Godot_v${GODOT_VERSION_FULL}-stable_linux_export_templates.x11.x86_64.zip" || {
            echo "Failed to download Linux template"
            exit 1
          }
          unzip -o linux_template.zip -d linux_template/
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/linux_x86_64
          cp linux_template/templates/${GODOT_VERSION_FULL}.stable/linux_release.x86_64 \
            ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/linux_release.x86_64 || true
          cp linux_template/templates/${GODOT_VERSION_FULL}.stable/linux_debug.x86_64 \
            ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/linux_debug.x86_64 || true
          echo "Linux template installed"
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/ || true

      - name: Linux Build
        run: |
          mkdir -p build/linux
          godot --headless --verbose --export-release "Linux/X11" build/linux/${PROJECT_NAME}.x86_64 2>&1 || exit 1
          ls -lh build/linux/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux

  # ============================================================
  # Web 导出 (HTML5)
  # 注意：需要先在 Godot 编辑器中添加 "Web" 导出预设
  # ============================================================
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable ~/.local/share/godot/export_templates/
          fi
          echo "=== Export Templates Available ==="
          ls -la ~/.local/share/godot/export_templates/ || echo "No templates found"

      - name: Download Web Export Template
        run: |
          cd /tmp
          echo "Downloading Godot ${GODOT_VERSION_FULL} Web export template..."
          curl -L -o web_template.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION_FULL}-stable/Godot_v${GODOT_VERSION_FULL}-stable_web_export_templates.zip" || {
            echo "Failed to download Web template"
            exit 1
          }
          unzip -o web_template.zip -d web_template/
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/web
          cp web_template/templates/${GODOT_VERSION_FULL}.stable/web_release.wasm \
            ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/web_release.wasm || true
          cp web_template/templates/${GODOT_VERSION_FULL}.stable/web_debug.wasm \
            ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/web_debug.wasm || true
          echo "Web template installed"
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable/ || true

      - name: Web Build
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html 2>&1 || exit 1
          ls -lh build/web/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          cd build/web
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy to GitHub Pages"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master:gh-pages
        continue-on-error: true

  # ============================================================
  # Android 导出 (APK)
  # 注意：需要先在 Godot 编辑器中配置 Android 导出预设和签名密钥
  # ============================================================
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    if: false # 暂时禁用，直到配置完成
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mkdir -p ~/.config/godot
          if [ -d "/root/.config/godot" ]; then
            cp -r /root/.config/godot/* ~/.config/godot/ || true
          fi
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION_FULL}.stable ~/.local/share/godot/export_templates/
          fi
          mkdir -p ~/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable
          if [ -d "/root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable" ]; then
            mv /root/.local/share/godot/templates/${GODOT_VERSION_FULL}.stable ~/.local/share/godot/templates/
          fi

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$ANDROID_HOME"
          which java || echo "Java not found"
          which keytool || echo "keytool not found"

      - name: Create Debug Keystore
        run: |
          # 检查是否有 java/keytool
          if ! command -v keytool &> /dev/null; then
            echo "keytool not found, installing openjdk..."
            apt-get update && apt-get install -y openjdk-11-jdk-headless || true
          fi
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" || echo "Keystore creation failed"

      - name: Build APK (Debug Mode)
        run: |
          mkdir -p build/android
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

          godot --headless --verbose \
            --export-debug "Android" \
            build/android/${PROJECT_NAME}-debug.apk 2>&1 || {
            echo "Export failed"
            exit 1
          }

          ls -lh build/android/ || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/*.apk
          if-no-files-found: ignore

  # ============================================================
  # 构建汇总
  # ============================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [export-windows, export-linux, export-web]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.export-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | ${{ needs.export-linux.result || 'disabled' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web      | ${{ needs.export-web.result || 'disabled' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android  | ${{ needs.export-android.result || 'disabled' }} |" >> $GITHUB_STEP_SUMMARY
