name: Godot Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.2.2
  EXPORT_NAME: RhythmX

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install .NET SDK
        run: |
          apt-get update && apt-get install -y dotnet-sdk-8.0
          
      - name: Setup Godot Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          
      - name: Build C# Solution
        run: |
          dotnet restore
          dotnet build -c Release
          
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/${EXPORT_NAME}.exe
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows

  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install .NET SDK
        run: |
          apt-get update && apt-get install -y dotnet-sdk-8.0
        
      - name: Setup Godot Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          
      - name: Build C# Solution
        run: |
          dotnet restore
          dotnet build -c Release
          
      - name: Web Build
        run: |
          mkdir -v -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web
          
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          cd build/web
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Deploy to GitHub Pages"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master:gh-pages
        continue-on-error: true

  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install .NET SDK
        run: |
          apt-get update && apt-get install -y dotnet-sdk-8.0
        
      - name: Setup Godot Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          
      - name: Build C# Solution
        run: |
          dotnet restore
          dotnet build -c Release
          
      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          godot --headless --verbose --export-release "Linux/X11" build/linux/${EXPORT_NAME}.x86_64
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux

  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2.2
    env:
      ANDROID_HOME: /usr/lib/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install .NET SDK and Dependencies
        run: |
          apt-get update
          apt-get install -y dotnet-sdk-8.0 openjdk-17-jdk android-sdk
        
      - name: Setup Godot Templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      
      - name: Configure Editor Settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" load_steps=2 format=3]

          [sub_resource type="EditorSettings" id="EditorSettings_abc"]

          [resource]
          export/android/android_sdk_path = "/usr/lib/android-sdk"
          export/android/jdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/debug_keystore = "res://debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_password = "android"
          EOF

      - name: Install Android Build Template
        run: |
          # Create android/build directory for build template
          mkdir -p android/build/src
          mkdir -p android/build/plugins
          # Create build.gradle
          cat > android/build/build.gradle << 'GRADLE'
          // Build template generated by CI
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          GRADLE
          # Create AndroidManifest.xml
          mkdir -p android/build/src/main
          cat > android/build/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.rhythmx.game">
              <uses-feature android:glEsVersion="0x00020000" android:required="true" />
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:label="RhythmX"
                  android:icon="@mipmap/icon">
                  <activity android:name=".GodotApp" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST
          
      - name: Build C# Solution
        run: |
          dotnet restore
          dotnet build -c Release
          
      - name: Android Debug Build
        run: |
          mkdir -v -p build/android
          godot --headless --verbose --export-debug "Android" build/android/${EXPORT_NAME}.apk
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/android