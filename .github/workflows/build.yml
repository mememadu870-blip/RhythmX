# Godot 4.6 多平台构建工作流
name: Godot Build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.6.1
  PROJECT_NAME: RhythmX

jobs:
  # ============================================================
  # Windows 桌面版构建
  # ============================================================
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:${GODOT_VERSION}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/
          fi
          ls -la ~/.local/share/godot/export_templates/

      - name: Verify Project
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo "=== Export Presets ==="
          cat export_presets.cfg | head -30

      - name: Windows Build
        run: |
          mkdir -p build/windows
          godot --headless --verbose --export-release "Windows Desktop" build/windows/${PROJECT_NAME}.exe
          echo "=== Build Output ==="
          ls -lh build/windows/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows

  # ============================================================
  # Linux 桌面版构建
  # ============================================================
  export-linux:
    name: Linux Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:${GODOT_VERSION}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/
          fi

      - name: Linux Build
        run: |
          mkdir -p build/linux
          godot --headless --verbose --export-release "Linux/X11" build/linux/${PROJECT_NAME}.x86_64
          ls -lh build/linux/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux

  # ============================================================
  # Web 导出 (HTML5)
  # ============================================================
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:${GODOT_VERSION}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/
          fi

      - name: Web Build
        run: |
          mkdir -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html
          ls -lh build/web/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  # ============================================================
  # Android 导出 (APK)
  # ============================================================
  export-android:
    name: Android Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:${GODOT_VERSION}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/
          fi
          # Also copy to templates directory for Godot 4.x
          mkdir -p ~/.local/share/godot/templates/${GODOT_VERSION}.stable
          if [ -d "/root/.local/share/godot/templates/${GODOT_VERSION}.stable" ]; then
            mv /root/.local/share/godot/templates/${GODOT_VERSION}.stable ~/.local/share/godot/templates/
          fi

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "PATH=$PATH"
          sdkmanager --version 2>/dev/null || echo "sdkmanager not found"
          ls -la $ANDROID_HOME 2>/dev/null || echo "Android SDK not found"

      - name: Create Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore \
            -storepass android -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK (Debug Mode)
        run: |
          mkdir -p build/android
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

          # Try export with debug settings
          godot --headless --verbose \
            --export-debug "Android" \
            build/android/${PROJECT_NAME}-debug.apk 2>&1 || {
            echo "Standard export failed, trying alternative..."
            # Fallback: check if Godot recognizes the preset
            godot --headless --list-features 2>&1 | grep -i android || true
            exit 1
          }

          echo "=== APK Output ==="
          ls -lh build/android/ || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/*.apk
          if-no-files-found: ignore

  # ============================================================
  # 构建汇总
  # ============================================================
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [export-windows, export-linux, export-web, export-android]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.export-windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | ${{ needs.export-linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web      | ${{ needs.export-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Android  | ${{ needs.export-android.result }} |" >> $GITHUB_STEP_SUMMARY
